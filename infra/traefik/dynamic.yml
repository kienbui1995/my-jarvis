# Traefik dynamic configuration
http:
  routers:
    backend:
      rule: "Host(`api.${DOMAIN}`) || (Host(`${DOMAIN}`) && PathPrefix(`/api`))"
      service: backend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

    frontend:
      rule: "Host(`${DOMAIN}`)"
      service: frontend
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://backend:8000"

    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:3000"

  middlewares:
    rate-limit:
      rateLimit:
        average: 100
        burst: 50
    security-headers:
      headers:
        browserXssFilter: true
        contentTypeNosniff: true
        frameDeny: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 63072000
