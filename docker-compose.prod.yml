services:
  postgres:
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M }
    shm_size: 256mb
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  redis:
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 256M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  minio:
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  backend:
    build:
      target: prod
    env_file: .env.prod
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2
    restart: unless-stopped
    networks:
      - default
      - tunnel-net
    deploy:
      resources:
        limits: { memory: 512M, cpus: "1" }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  worker:
    env_file: .env.prod
    restart: unless-stopped
    deploy:
      resources:
        limits: { memory: 512M }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_URL: /api/v1
        NEXT_PUBLIC_WS_URL: wss://jarvis.pmai.space/api/v1/ws/chat
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    environment:
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=/api/v1
      - NEXT_PUBLIC_WS_URL=wss://jarvis.pmai.space/api/v1/ws/chat
    restart: unless-stopped
    networks:
      - default
      - tunnel-net
    deploy:
      resources:
        limits: { memory: 256M, cpus: "0.5" }
    logging:
      driver: json-file
      options: { max-size: "10m", max-file: "3" }

networks:
  tunnel-net:
    external: true
