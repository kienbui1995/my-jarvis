trigger:
  branches:
    include: [main]

pr:
  branches:
    include: [main]

pool:
  name: Taureau-agent

stages:
  - stage: CI
    jobs:
      - job: backend_lint
        displayName: Backend Lint
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
          - script: pip install ruff && ruff check . --select E9,F63,F7,F82 --no-fix
            workingDirectory: backend

      - job: frontend_build
        displayName: Frontend Build
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "22.x"
          - script: npm ci && npm run build
            workingDirectory: frontend

  # Deploy stage — uncomment when jarvis-server SSH service connection is configured
  # - stage: Deploy
  #   dependsOn: CI
  #   condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  #   jobs:
  #     - job: deploy
  #       steps:
  #         - task: SSH@0
  #           inputs:
  #             sshEndpoint: jarvis-server
  #             runOptions: inline
  #             inline: |
  #               cd ~/my-jarvis && git pull origin main && make build && make prod

  - stage: SyncGitHub
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: sync
        displayName: Sync to GitHub (Community)
        steps:
          - checkout: self
            fetchDepth: 0
          - script: |
              git config user.name "MY JARVIS CI"
              git config user.email "ci@jarvis.pmai.space"

              # Read exclude patterns
              EXCLUDES=""
              while IFS= read -r line; do
                line="${line%%#*}"
                line="$(echo "$line" | xargs)"
                [ -z "$line" ] && continue
                EXCLUDES="$EXCLUDES $line"
              done < .github-sync-ignore

              # Remove private files
              for pattern in $EXCLUDES; do
                [ -e "$pattern" ] && git rm -rf --cached "$pattern" >/dev/null 2>&1 && rm -rf "$pattern" || true
              done

              git add -A
              git commit --allow-empty -m "sync: community edition $(Build.SourceVersion)"

              # Push to GitHub
              git remote add github https://$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git
              git push github HEAD:main --force
              git push github --tags --force 2>/dev/null || true

              # Create GitHub Release if tag exists on this commit
              TAG=$(git tag --points-at HEAD | head -1)
              if [ -n "$TAG" ]; then
                echo "Creating GitHub Release for $TAG..."
                BODY=$(sed -n "/^## \[${TAG#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
                [ -z "$BODY" ] && BODY="Release $TAG"

                curl -s -X POST \
                  -H "Authorization: token $(GITHUB_PAT)" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$(GITHUB_REPO)/releases" \
                  -d "$(jq -n --arg tag "$TAG" --arg name "MY JARVIS $TAG" --arg body "$BODY" \
                    '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')"
                echo "GitHub Release $TAG created"
              fi
            displayName: Filter & push to GitHub
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              GITHUB_REPO: $(GITHUB_REPO)
