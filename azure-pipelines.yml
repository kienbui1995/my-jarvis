trigger:
  branches:
    include: [main]
  tags:
    include: ['v*.*.*']

pr:
  branches:
    include: [main]
  paths:
    exclude: ['**/*.md', 'docs/**']

pool:
  name: Taureau-agent

variables:
  # EC2 config — move to variable group for production
  - name: EC2_USER
    value: 'ubuntu'
  - name: EC2_APP_DIR
    value: '/data/projects/my-jarvis'

stages:
  # ── Stage 1: CI ──
  - stage: CI
    displayName: 'CI — Lint & Build'
    condition: or(eq(variables['Build.Reason'], 'PullRequest'), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: Backend
        displayName: Backend Lint
        timeoutInMinutes: 10
        steps:
          - script: python3 -m pip install --user ruff && python3 -m ruff check . --select E9,F63,F7,F82 --no-fix
            workingDirectory: backend

      - job: Frontend
        displayName: Frontend Build
        timeoutInMinutes: 15
        steps:
          - script: npm ci && npm run build
            workingDirectory: frontend

  # ── Stage 2: Deploy PROD (tag v*.*.*) ──
  # NOTE: Add approval gate in ADO:
  # Pipelines → Environments → production → Approvals and checks
  - stage: Deploy
    displayName: 'Deploy — PROD EC2'
    dependsOn: []
    condition: startsWith(variables['Build.SourceBranch'], 'refs/tags/v')
    jobs:
      - deployment: DeployProd
        displayName: Deploy to Production
        timeoutInMinutes: 30
        environment: jarvis-production
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: DownloadSecureFile@1
                  name: sshKey
                  displayName: Download EC2 SSH key
                  inputs:
                    secureFile: 'ec2-prod.pem'

                - script: |
                    set -euo pipefail

                    chmod 600 $(sshKey.secureFilePath)
                    mkdir -p ~/.ssh
                    ssh-keyscan -H $(EC2_HOST) >> ~/.ssh/known_hosts 2>/dev/null
                    SSH="ssh -i $(sshKey.secureFilePath) $(EC2_USER)@$(EC2_HOST)"
                    APP_DIR="$(EC2_APP_DIR)"
                    COMPOSE="docker compose -p my-jarvis -f docker-compose.yml -f docker-compose.prod.yml"

                    # ── Safety checks ──
                    if [ -z "$APP_DIR" ] || [ "$APP_DIR" = "/" ] || [ "$APP_DIR" = "/data" ] || [ "$APP_DIR" = "/data/projects" ]; then
                      echo "❌ FATAL: EC2_APP_DIR is empty or too broad: '$APP_DIR'"; exit 1
                    fi

                    echo "==> [1/7] Ensure app directory..."
                    $SSH "mkdir -p $APP_DIR"

                    echo "==> [2/7] Rsync source to EC2..."
                    rsync -az --delete \
                      --exclude='.git' --exclude='.env*' --exclude='__pycache__' \
                      --exclude='*.pyc' --exclude='node_modules' --exclude='.next' \
                      --exclude='.claude' --exclude='azure-pipelines.yml' \
                      -e "ssh -i $(sshKey.secureFilePath)" \
                      $(Build.SourcesDirectory)/ \
                      $(EC2_USER)@$(EC2_HOST):$APP_DIR/

                    echo "==> [3/7] Verify .env.prod..."
                    $SSH "test -f $APP_DIR/.env.prod" || {
                      echo "❌ .env.prod missing on EC2!"; exit 1
                    }

                    echo "==> [4/7] Verify external networks..."
                    $SSH "docker network inspect tunnel-net >/dev/null 2>&1 || docker network create tunnel-net"
                    $SSH "docker network inspect litellm-proxy_default >/dev/null 2>&1 || docker network create litellm-proxy_default"

                    echo "==> [5/7] Backup DB before migration..."
                    BACKUP="jarvis_backup_$(date +%Y%m%d_%H%M%S).sql"
                    $SSH "cd $APP_DIR && $COMPOSE exec -T postgres pg_dump -U \${POSTGRES_USER:-jarvis} \${POSTGRES_DB:-jarvis} > /tmp/$BACKUP 2>/dev/null" || echo "⚠️ DB backup skipped (first deploy or DB not running)"

                    echo "==> [6/7] Run DB migrations..."
                    $SSH "cd $APP_DIR && $COMPOSE run --rm backend alembic upgrade head"

                    echo "==> [7/7] Rebuild & restart..."
                    $SSH "cd $APP_DIR && $COMPOSE up -d --build --remove-orphans"

                    echo "==> Verify my-jarvis containers..."
                    $SSH "cd $APP_DIR && $COMPOSE ps"

                    echo "==> Verify sale-ai untouched..."
                    $SSH "docker compose -p sale-ai ps 2>/dev/null | head -5" || true

                    echo "✅ Deploy complete! (DB backup: /tmp/$BACKUP)"
                  displayName: 'Rsync + Backup + Migrate + Restart'
                  env:
                    EC2_HOST: $(EC2_HOST)

  # ── Stage 3: Smoke Test ──
  - stage: SmokeTest
    displayName: Smoke Test
    dependsOn: Deploy
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - job: HealthCheck
        displayName: Health check production
        timeoutInMinutes: 5
        steps:
          - script: |
              EXPECTED=$(echo "$(Build.SourceBranch)" | sed 's|refs/tags/v||')
              echo "Expected version: $EXPECTED"

              for i in $(seq 1 12); do
                RESP=$(curl -sf https://jarvis.pmai.space/health 2>/dev/null || echo "")
                if [ -n "$RESP" ]; then
                  ACTUAL=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version',''))" 2>/dev/null)
                  if [ "$ACTUAL" = "$EXPECTED" ]; then
                    echo "✅ /health OK — version $ACTUAL"

                    echo "==> Checking /health/ready..."
                    curl -sf https://jarvis.pmai.space/health/ready | python3 -c "
                    import sys,json; d=json.load(sys.stdin)
                    for k,v in d.get('checks',{}).items(): print(f'  {k}: {v}')
                    print(f'Status: {d[\"status\"]}')
                    " 2>/dev/null || true
                    exit 0
                  fi
                fi
                echo "Attempt $i/12 — retry in 10s..."
                sleep 10
              done
              echo "❌ Health check timed out"; exit 1
            displayName: Verify health + version + dependencies

  # ── Stage 4: Sync GitHub (after CI passes) ──
  - stage: SyncGitHub
    displayName: Sync GitHub (Community)
    dependsOn: CI
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: sync
        displayName: Filter & push to GitHub
        timeoutInMinutes: 10
        steps:
          - checkout: self
            fetchDepth: 0
          - script: |
              set -euo pipefail
              git config user.name "MY JARVIS CI"
              git config user.email "ci@jarvis.pmai.space"

              # Filter private files
              while IFS= read -r line; do
                line="${line%%#*}"; line="$(echo "$line" | xargs)"
                [ -z "$line" ] && continue
                [ -e "$line" ] && git rm -rf --cached "$line" >/dev/null 2>&1 && rm -rf "$line" || true
              done < .github-sync-ignore

              git add -A
              git commit --allow-empty -m "sync: community edition $(Build.SourceVersion)"

              git remote add github https://$(GITHUB_PAT)@github.com/$(GITHUB_REPO).git 2>/dev/null || true
              git push github HEAD:main --force
              git push github --tags --force 2>/dev/null || true

              # Create GitHub Release if tag on HEAD
              TAG=$(git tag --points-at HEAD | head -1)
              if [ -n "$TAG" ]; then
                BODY=$(sed -n "/^## \[${TAG#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
                [ -z "$BODY" ] && BODY="Release $TAG"
                curl -s -X POST \
                  -H "Authorization: token $(GITHUB_PAT)" \
                  -H "Accept: application/vnd.github.v3+json" \
                  "https://api.github.com/repos/$(GITHUB_REPO)/releases" \
                  -d "$(jq -n --arg tag "$TAG" --arg name "MY JARVIS $TAG" --arg body "$BODY" \
                    '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}')" || true
                echo "GitHub Release $TAG created"
              fi
            displayName: Filter & push to GitHub
            env:
              GITHUB_PAT: $(GITHUB_PAT)
              GITHUB_REPO: $(GITHUB_REPO)

  # ── Stage 5: Notify on failure ──
  - stage: Notify
    displayName: Notify on Failure
    dependsOn: [CI, Deploy, SmokeTest, SyncGitHub]
    condition: failed()
    jobs:
      - job: Alert
        displayName: Send failure alert
        timeoutInMinutes: 5
        steps:
          - script: |
              PIPELINE_URL="$(System.CollectionUri)$(System.TeamProject)/_build/results?buildId=$(Build.BuildId)"
              BRANCH="$(Build.SourceBranchName)"
              echo "❌ MY JARVIS CI/CD FAILED"
              echo "Branch: $BRANCH"
              echo "Build: $PIPELINE_URL"
              echo "Reason: $(Build.Reason)"
              # TODO: Add Slack/Telegram webhook notification
              # curl -s -X POST "$(SLACK_WEBHOOK_URL)" -H "Content-Type: application/json" \
              #   -d "{\"text\": \"❌ MY JARVIS CI/CD FAILED — Branch: $BRANCH — <$PIPELINE_URL|Build #$(Build.BuildId)>\"}"
            displayName: Log failure details
