services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jarvis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jarvis}
      POSTGRES_DB: ${POSTGRES_DB:-jarvis}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jarvis}"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 2G }

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      retries: 5
    deploy:
      resources:
        limits: { memory: 512M }

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      retries: 5
    deploy:
      resources:
        limits: { memory: 1G }

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: my-jarvis-backend:${APP_VERSION:-3.0.0}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - default
      - litellm-net
    deploy:
      resources:
        limits: { memory: 3G }

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: my-jarvis-backend:${APP_VERSION:-3.0.0}
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq services.proactive.WorkerSettings
    networks:
      - default
      - litellm-net
    deploy:
      resources:
        limits: { memory: 3G }

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: my-jarvis-frontend:${APP_VERSION:-3.0.0}
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8002/api/v1}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL:-ws://localhost:8002/api/v1/ws/chat}
      - NEXT_PUBLIC_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      - backend
    deploy:
      resources:
        limits: { memory: 1G }

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  litellm-net:
    name: litellm-proxy_default
    external: true
